<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio-Reactive Visualizer — PythonMagic</title>
    <meta name="description"
        content="Full-screen audio-reactive visualizer with 6 render modes and real-time microphone input.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>

<body>
    <!-- Full-screen canvas -->
    <div class="viz-fullpage">
        <canvas id="audio-canvas"></canvas>
    </div>

    <!-- Back button -->
    <a href="magic.html" class="viz-back-btn">← Magic</a>

    <!-- Mode selector bar (top center) -->
    <div class="viz-mode-bar" id="audio-modes">
        <button class="active" data-mode="radial">🔴 Radial</button>
        <button data-mode="terrain">🏔️ Terrain</button>
        <button data-mode="orbs">🫧 Orbs</button>
        <button data-mode="starfield">✨ Stars</button>
        <button data-mode="dna">🧬 DNA</button>
        <button data-mode="nebula">🌌 Nebula</button>
    </div>

    <!-- Floating right panel -->
    <div class="viz-controls-panel viz-panel-right" id="audio-panel">
        <button class="viz-panel-toggle" id="audio-toggle">✕</button>
        <div class="viz-panel-body">
            <div class="viz-panel-title">🎵 Audio Controls</div>

            <!-- Source buttons -->
            <div style="display:flex;gap:0.4rem;margin-bottom:0.75rem;">
                <button class="viz-preset-pill active" id="audio-demo-btn">▶ Demo</button>
                <button class="viz-preset-pill" id="audio-mic-btn">🎤 Mic Off</button>
            </div>

            <hr class="viz-panel-divider">

            <div class="viz-control-row">
                <label>Sensitivity</label>
                <input type="range" id="audio-sensitivity" min="10" max="100" value="75">
                <span class="viz-val" id="audio-sens-val">75</span>
            </div>
            <div class="viz-control-row">
                <label>Reactivity</label>
                <input type="range" id="audio-reactivity" min="10" max="100" value="40">
                <span class="viz-val" id="audio-react-val">40</span>
            </div>

            <hr class="viz-panel-divider">
            <div class="viz-panel-title">Color Scheme</div>
            <div style="display:flex;gap:0.4rem;flex-wrap:wrap;">
                <button class="viz-preset-pill active" data-color="neon">💚 Neon</button>
                <button class="viz-preset-pill" data-color="sunset">🌅 Sunset</button>
                <button class="viz-preset-pill" data-color="arctic">🧊 Arctic</button>
                <button class="viz-preset-pill" data-color="vapor">💜 Vapor</button>
            </div>
        </div>
    </div>

    <!-- HUD -->
    <div class="viz-hud">
        <span>FPS: <strong id="audio-fps">60</strong></span>
        <span>Bass: <strong id="audio-bass" style="color:var(--py-yellow)">0</strong></span>
    </div>

    <!-- Onboarding -->
    <div class="viz-onboarding" id="audio-onboarding">
        <div class="viz-onboarding-content">
            <div class="viz-onboard-icon">🎵</div>
            <h2>Audio-Reactive Visualizer</h2>
            <p>Sound becomes art — demo mode auto-starts with synthesized audio</p>
            <div class="viz-onboard-hint">Click anywhere to begin · Enable mic for real audio · Switch modes at top
            </div>
        </div>
    </div>

    <script src="js/magic-audio.js"></script>
</body>

</html>
